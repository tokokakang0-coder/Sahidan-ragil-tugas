<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI_SINGULARITY_V_FINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Orbitron:wght@900&family=Share+Tech+Mono&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; background: #000; overflow: hidden; }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Share Tech Mono', monospace;
            perspective: 2000px;
            cursor: none; /* Kita ganti kursor dengan partikel cahaya */
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; filter: contrast(1.8) brightness(1.2); }

        /* HUD YANG BERGERAK LIAR */
        .system-log {
            position: absolute;
            z-index: 100;
            color: #0f0;
            font-size: 0.7rem;
            text-shadow: 0 0 5px #0f0;
            pointer-events: none;
            text-transform: uppercase;
        }

        /* INTI KINETIK YANG TERUS BERGETAR */
        .core-wrapper {
            position: relative;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: transparent;
            animation: globalShake 0.05s infinite;
        }

        @keyframes globalShake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(2px, 1px); }
        }

        .god-calligraphy {
            font-family: 'Amiri', serif;
            font-size: 11rem;
            color: #fff;
            background: transparent;
            text-shadow: 5px 5px #f0f, -5px -5px #0ff, 0 0 50px rgba(255,255,255,0.5);
            transition: transform 0.1s;
        }

        /* TOMBOL KOTAK MEKANIS YANG TERUS BERGERAK */
        .entry-box {
            margin-top: 20px;
            width: 280px;
            height: 80px;
            border: 4px solid #fff;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 10px;
            text-decoration: none;
            position: relative;
            box-shadow: 0 0 30px #f0f, inset 0 0 20px #0ff;
            animation: pulseBox 0.4s infinite alternate;
        }

        @keyframes pulseBox {
            from { transform: scale(1); filter: hue-rotate(0deg); }
            to { transform: scale(1.1); filter: hue-rotate(360deg); }
        }

        .entry-box:hover {
            background: #fff;
            color: #000;
            filter: invert(1);
        }

        /* KURSOR KUSTOM (BLACK HOLE) */
        #cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease-out;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="system-log" style="top:20px; left:20px;">
        >> ENERGY_SOURCE: AL_HAYY_AL_QAYYUM<br>
        >> STATUS: UNSTABLE_POWER_MAX<br>
        >> SCANNING_SOUL... [DONE]
    </div>

    <div class="system-log" style="bottom:20px; right:20px; text-align:right;">
        OMNI_ENGINE_V.FINAL<br>
        COORD_Z: <span id="coordZ">0</span><br>
        REALTIME_RES: 8K_SPIRITUAL
    </div>

    <canvas id="singularityCanvas"></canvas>

    <div class="core-wrapper" id="coreUnit">
        <div class="god-calligraphy">طريقة الوضوء</div>
        
        <a href="beranda.html" class="entry-box">TOMBOL MASUK</a>
        
        <div style="margin-top: 30px; font-weight: bold; letter-spacing: 5px; color: #fff; background: transparent;">
            HYPER_KINETIC_CONNECTED
        </div>
    </div>

    <script>
        const canvas = document.getElementById('singularityCanvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        const coreUnit = document.getElementById('coreUnit');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let mouse = { x: canvas.width/2, y: canvas.height/2 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            cursor.style.left = e.clientX - 20 + 'px';
            cursor.style.top = e.clientY - 20 + 'px';

            // Efek 3D Parallax pada Inti
            let rotX = (e.clientY - window.innerHeight/2) * 0.1;
            let rotY = (e.clientX - window.innerWidth/2) * 0.1;
            coreUnit.style.transform = `rotateX(${-rotX}deg) rotateY(${rotY}deg)`;
        });

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 4 + 1;
                this.vx = (Math.random() - 0.5) * 20; // Kecepatan ledakan
                this.vy = (Math.random() - 0.5) * 20;
                this.life = 100;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Tarikan gravitasi maut ke kursor
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 300) {
                    this.vx += dx * 0.05;
                    this.vy += dy * 0.05;
                }

                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Sambaran petir acak ke mouse
                if (Math.random() > 0.99) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.stroke();
                }
            }
        }

        function init() {
            for(let i=0; i<400; i++) particles.push(new Particle());
        }

        function animate() {
            // Background meledak (Glitch Effect)
            if (Math.random() > 0.95) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            } else {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            }
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            document.getElementById('coordZ').innerText = Math.floor(Math.random() * 9999);

            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
